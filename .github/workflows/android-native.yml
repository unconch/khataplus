name: Android Native

on:
  push:
    branches:
      - android
    paths:
      - "KhataPlus Android/**"
      - ".github/workflows/android-native.yml"
  pull_request:
    paths:
      - "KhataPlus Android/**"
      - ".github/workflows/android-native.yml"

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: "./KhataPlus Android"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: gradle

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Make Gradle executable
        run: chmod +x gradlew

      - name: Build debug APK
        run: ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: khataplus-native-debug
          path: "./KhataPlus Android/app/build/outputs/apk/debug/*.apk"
